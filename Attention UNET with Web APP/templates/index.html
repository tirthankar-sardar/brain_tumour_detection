<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>
    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">
</head>
<body>

<div class="container">

<h1>
Brain Tumor Detection
</h1>

<form
action="/predict"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="image"
accept=".tif,.tiff"
required>

<button type="submit">
Predict
</button>

</form>

</div>

</body>
</html>
